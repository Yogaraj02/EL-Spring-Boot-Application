<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student — College Event Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="orb orb-4"></div>

<nav class="navbar">
    <a href="/web" class="navbar-brand">
        <div class="navbar-logo">CE</div>
        <span class="navbar-title">College <span>Events</span></span>
    </a>
    <div class="navbar-links">
        <a href="/web/events" class="nav-link">Events</a>
        <a href="/web/students" class="nav-link active">Students</a>
        <a href="/web/coordinators" class="nav-link">Coordinators</a>
        <a href="/web/assignments" class="nav-link nav-pill">Assignments</a>
    </div>
</nav>

<div class="page-wrapper narrow">
    <div class="page-header">
        <div class="breadcrumb">
            <a href="/web">Home</a> / <a href="/web/students">Students</a> / Edit
        </div>
        <h1>✏️ Edit Student</h1>
        <p>Update academic and contact information.</p>
    </div>

    <div class="card" style="animation: fadeUp 0.4s ease both;">
        <form th:action="@{/web/students/edit/{id}(id=${student.id})}" method="post" style="display:flex; flex-direction:column; gap:20px;">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" th:value="${student.name}" required>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="rollNo">Roll Number</label>
                    <input type="text" id="rollNo" name="rollNo" th:value="${student.rollNo}" required>
                </div>
                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" id="department" name="department" th:value="${student.department}" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">College Email</label>
                <input type="email" id="email" name="email" th:value="${student.email}" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-lg">
                    Update Record
                </button>
                <a href="/web/students" class="btn btn-ghost btn-lg">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
