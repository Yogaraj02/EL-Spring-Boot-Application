<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Coordinator — College Event Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="orb orb-4"></div>

<nav class="navbar">
    <a href="/web" class="navbar-brand">
        <div class="navbar-logo">CE</div>
        <span class="navbar-title">College <span>Events</span></span>
    </a>
    <div class="navbar-links">
        <a href="/web/events" class="nav-link">Events</a>
        <a href="/web/coordinators" class="nav-link active">Coordinators</a>
        <a href="/web/assignments" class="nav-link nav-pill">Assignments</a>
    </div>
</nav>

<div class="page-wrapper narrow">
    <div class="page-header">
        <div class="breadcrumb">
            <a href="/web">Home</a> / <a href="/web/coordinators">Coordinators</a> / Edit
        </div>
        <h1>✏️ Edit Coordinator</h1>
        <p>Update this coordinator's information below.</p>
    </div>

    <div class="card" style="animation: fadeUp 0.4s ease both;">
        <form th:action="@{/web/coordinators/edit/{id}(id=${coordinator.coordinatorId})}" method="post"
              style="display:flex; flex-direction:column; gap:20px;">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" th:value="${coordinator.name}" required>
            </div>

            <div class="form-group">
                <label for="department">Department</label>
                <input type="text" id="department" name="department" th:value="${coordinator.department}" required>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" th:value="${coordinator.email}" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" th:value="${coordinator.phone}" required>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width:16px;height:16px;"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                    Update Coordinator
                </button>
                <a href="/web/coordinators" class="btn btn-ghost btn-lg">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
