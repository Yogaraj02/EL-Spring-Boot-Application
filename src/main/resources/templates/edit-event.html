<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Event — College Event Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="orb orb-4"></div>

<nav class="navbar">
    <a href="/web" class="navbar-brand">
        <div class="navbar-logo">CE</div>
        <span class="navbar-title">College <span>Events</span></span>
    </a>
    <div class="navbar-links">
        <a href="/web/events" class="nav-link active">Events</a>
        <a href="/web/coordinators" class="nav-link">Coordinators</a>
        <a href="/web/assignments" class="nav-link nav-pill">Assignments</a>
    </div>
</nav>

<div class="page-wrapper narrow">
    <div class="page-header">
        <div class="breadcrumb">
            <a href="/web">Home</a> / <a href="/web/events">Events</a> / Edit
        </div>
        <h1>✏️ Edit Event</h1>
        <p>Update the details for this event. Changes are saved immediately.</p>
    </div>

    <div class="card" style="animation: fadeUp 0.4s ease both;">
        <form th:action="@{/web/events/edit/{id}(id=${event.eventId})}" method="post"
              style="display:flex; flex-direction:column; gap:20px;">

            <div class="form-group">
                <label for="name">Event Name</label>
                <input type="text" id="name" name="name" th:value="${event.name}" required>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="type">Event Type</label>
                    <input type="text" id="type" name="type" th:value="${event.type}" required>
                </div>
                <div class="form-group">
                    <label for="venue">Venue</label>
                    <input type="text" id="venue" name="venue" th:value="${event.venue}" required>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="date">Date (DD-MM-YYYY)</label>
                    <input type="text" id="date" name="date" th:value="${event.date}" required>
                </div>
                <div class="form-group">
                    <label for="time">Time</label>
                    <input type="text" id="time" name="time" th:value="${event.time}" required>
                </div>
            </div>

            <div class="form-group">
                <label for="fee">Entry Fee (₹)</label>
                <input type="number" id="fee" name="fee" th:value="${event.fee}" required min="0">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-info btn-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width:16px;height:16px;"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                    Update Event
                </button>
                <a href="/web/events" class="btn btn-ghost btn-lg">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
